repos:
  - repo: https://github.com/koalaman/shellcheck
    rev: v0.9.0
    hooks:
      - id: shellcheck
        files: '\.sh$'
  - repo: https://github.com/mvdan/sh
    rev: v3.6.0
    hooks:
      - id: shfmt
        args: ["-i", "2", "-s"]
        files: '\.sh$'
  - repo: https://github.com/editorconfig-checker/editorconfig-checker.python
    rev: 2.7.0
    hooks:
      - id: editorconfig-checker
